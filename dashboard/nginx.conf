server {
    listen 3010;
    root /usr/share/nginx/html;
    index index.html;

    location /api/products/ {
        proxy_pass http://ecommerce-product-service/;
        proxy_pass_request_headers on;
    }

    location /api/customers/ {
        proxy_pass http://ecommerce-customer-service/;
        proxy_pass_request_headers on;
    }

    location /api/carts/ {
        proxy_pass http://ecommerce-cart-service/;
        proxy_pass_request_headers on;
    }

    location /api/orders/ {
        proxy_pass http://ecommerce-order-service/;
        proxy_pass_request_headers on;
    }

    location /api/reviews/ {
        proxy_pass http://ecommerce-product-reviews-service/;
        proxy_pass_request_headers on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
