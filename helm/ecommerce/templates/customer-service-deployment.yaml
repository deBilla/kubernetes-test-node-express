{{- if .Values.customerService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce.fullname" . }}-customer-service
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/name: customer-service
spec:
  replicas: {{ .Values.customerService.replicaCount }}
  selector:
    matchLabels:
      {{- include "ecommerce.selectorLabels" (dict "name" "customer-service" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      {{- if .Values.linkerd.enabled }}
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-inbound-ports: "{{ $.Values.metricsPort }}"
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $.Values.metricsPort }}"
        prometheus.io/path: "/metrics"
      {{- end }}
      labels:
        {{- include "ecommerce.selectorLabels" (dict "name" "customer-service" "release" .Release.Name) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: customer-service
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          image: "{{ .Values.customerService.image.repository }}:{{ .Values.customerService.image.tag }}"
          imagePullPolicy: {{ .Values.customerService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.customerService.containerPort }}
              protocol: TCP
            - containerPort: {{ .Values.metricsPort }}
              protocol: TCP
              name: metrics
          env:
            - name: PORT
              value: {{ .Values.customerService.containerPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: "customer-service"
            {{- if .Values.mongodb.uri }}
            - name: DB_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-config
                  key: DB_URI
            {{- end }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-mongodb
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-mongodb
                  key: DB_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-mongodb
                  key: DB_URL
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.customerService.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.customerService.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.customerService.resources | nindent 12 }}
{{- end }}
