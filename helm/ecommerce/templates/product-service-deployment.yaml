{{- if .Values.productService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce.fullname" . }}-product-service
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/name: product-service
spec:
  replicas: {{ .Values.productService.replicaCount }}
  selector:
    matchLabels:
      {{- include "ecommerce.selectorLabels" (dict "name" "product-service" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ecommerce.selectorLabels" (dict "name" "product-service" "release" .Release.Name) | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: product-service
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          image: "{{ .Values.productService.image.repository }}:{{ .Values.productService.image.tag }}"
          imagePullPolicy: {{ .Values.productService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.productService.containerPort }}
              protocol: TCP
            - containerPort: {{ .Values.metricsPort }}
              protocol: TCP
              name: metrics
          env:
            - name: PORT
              value: {{ .Values.productService.containerPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: "product-service"
            {{- if .Values.mongodb.uri }}
            - name: DB_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-config
                  key: DB_URI
            {{- end }}
            - name: rabbitMQHost
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-config
                  key: RABBITMQ_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-mongodb
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-mongodb
                  key: DB_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce.fullname" . }}-mongodb
                  key: DB_URL
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.productService.resources | nindent 12 }}
{{- end }}
